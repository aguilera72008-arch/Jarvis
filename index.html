<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JARVIS"/>
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan: #00d4ff; --cyan-dim: rgba(0,212,255,0.12);
    --cyan-border: rgba(0,212,255,0.22); --bg: #060d10;
    --text: #d8eaed; --text-dim: #7aa8b0; --green: #00ff88;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* SETUP SCREEN */
  #keyScreen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 28px 22px; z-index: 100; overflow-y: auto; }
  #keyScreen.hidden { display: none; }
  .logo { font-family: 'Orbitron', monospace; font-size: 32px; color: var(--cyan); letter-spacing: 6px; margin-bottom: 4px; text-shadow: 0 0 30px rgba(0,212,255,0.5); }
  .logo-sub { font-size: 11px; color: rgba(0,212,255,0.4); letter-spacing: 2px; font-family: monospace; margin-bottom: 30px; }
  .setup-box { width: 100%; max-width: 360px; }
  .step { background: rgba(0,212,255,0.04); border: 1px solid var(--cyan-border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .step-num { font-size: 10px; color: var(--cyan); font-family: monospace; letter-spacing: 1px; margin-bottom: 6px; }
  .step-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .step-text a { color: var(--cyan); }
  .step-text strong { color: var(--text); }
  .free-badge { display: inline-block; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--green); font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; font-family: monospace; }
  .name-input, .key-input { width: 100%; background: rgba(0,212,255,0.05); border: 1px solid var(--cyan-border); border-radius: 10px; padding: 13px 15px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; caret-color: var(--cyan); margin-top: 8px; }
  .key-input { font-family: monospace; font-size: 13px; }
  .name-input:focus, .key-input:focus { border-color: rgba(0,212,255,0.5); }
  .key-btn { width: 100%; padding: 14px; margin-top: 10px; background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.4); border-radius: 10px; color: var(--cyan); font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .key-btn:hover { background: rgba(0,212,255,0.25); }

  /* APP */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #app.hidden { display: none; }

  /* Animated background */
  .bg-glow { position: fixed; top: -15%; left: 50%; transform: translateX(-50%); width: 80vw; height: 40vh; background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%); pointer-events: none; animation: gp 4s ease-in-out infinite; }
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }

  @keyframes gp { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bl { 0%,100%{opacity:0.2;transform:scale(0.75)} 50%{opacity:1;transform:scale(1)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes wave { 0%,100%{height:4px} 50%{height:20px} }
  @keyframes pulse-ring { 0%{transform:scale(0.9);opacity:1} 100%{transform:scale(1.8);opacity:0} }

  /* Header */
  header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--cyan-border); background: rgba(6,13,16,0.92); backdrop-filter: blur(20px); flex-shrink: 0; position: relative; z-index: 2; }
  .av { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid rgba(0,212,255,0.5); background: rgba(0,212,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 17px; color: var(--cyan); position: relative; flex-shrink: 0; }
  .av-dot { position: absolute; bottom: 1px; right: 1px; width: 9px; height: 9px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: gp 2s ease-in-out infinite; }
  .av-ring { position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(0,212,255,0.3); animation: pulse-ring 2s ease-out infinite; }
  .ht { flex: 1; }
  .ht h1 { font-family: 'Orbitron', monospace; font-size: 15px; letter-spacing: 3px; color: var(--cyan); font-weight: 700; text-shadow: 0 0 20px rgba(0,212,255,0.4); }
  .ht p { font-size: 10px; color: rgba(0,212,255,0.45); letter-spacing: 1px; font-family: monospace; }

  /* Time display */
  #clockDisplay { font-family: 'Orbitron', monospace; font-size: 11px; color: rgba(0,212,255,0.6); letter-spacing: 1px; text-align: right; }
  #dateDisplay { font-size: 9px; color: rgba(0,212,255,0.35); letter-spacing: 1px; font-family: monospace; text-align: right; }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; scroll-behavior: smooth; position: relative; z-index: 1; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.15); border-radius: 2px; }

  .msg { display: flex; gap: 10px; margin-bottom: 16px; animation: fu 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  .ma { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid var(--cyan-border); }
  .msg.user .ma { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
  .msg.assistant .ma { background: rgba(0,212,255,0.08); color: var(--cyan); }
  .mb { max-width: 83%; display: flex; flex-direction: column; gap: 8px; }
  .bubble { padding: 11px 14px; font-size: 14px; line-height: 1.65; border-radius: 14px; }
  .msg.user .bubble { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px 4px 14px 14px; color: #e0eaec; }
  .msg.assistant .bubble { background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.12); border-radius: 4px 14px 14px 14px; color: #b8d4d8; }
  .bubble strong { color: #e0eaec; }
  .bubble code { background: rgba(0,212,255,0.1); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.88em; }
  .bubble h2,.bubble h3,.bubble h4 { color: var(--cyan); margin: 10px 0 4px; }
  .li { display: flex; gap: 6px; margin: 3px 0; }
  .li .ar { color: var(--cyan); flex-shrink: 0; }

  /* Weather card */
  .weather-card { background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
  .weather-icon { font-size: 36px; }
  .weather-info { flex: 1; }
  .weather-temp { font-family: 'Orbitron', monospace; font-size: 24px; color: var(--cyan); }
  .weather-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .weather-location { font-size: 11px; color: rgba(0,212,255,0.4); font-family: monospace; margin-top: 4px; }
  .weather-details { display: flex; gap: 12px; margin-top: 8px; }
  .weather-detail { font-size: 11px; color: var(--text-dim); }
  .weather-detail span { color: var(--cyan); }

  /* Map card */
  .map-card { border: 1px solid rgba(0,212,255,0.2); border-radius: 12px; overflow: hidden; background: rgba(0,212,255,0.03); }
  .map-title { padding: 8px 12px; font-size: 11px; color: var(--cyan); font-family: monospace; letter-spacing: 1px; border-bottom: 1px solid rgba(0,212,255,0.1); display: flex; justify-content: space-between; align-items: center; }
  .map-card iframe { display: block; width: 100%; border: none; height: 240px; }
  .map-open-btn { font-size: 10px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: var(--cyan); padding: 3px 8px; border-radius: 6px; cursor: pointer; text-decoration: none; font-family: monospace; }
  .map-pins { padding: 8px 12px; }
  .map-pin { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
  .map-pin span { color: var(--cyan); margin-right: 4px; }

  /* Typing */
  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 14px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); opacity: 0.4; animation: bl 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

  /* Waveform */
  #waveform { display: none; align-items: center; justify-content: center; gap: 3px; padding: 8px 16px; height: 40px; }
  #waveform.active { display: flex; }
  .wave-bar { width: 4px; background: var(--cyan); border-radius: 2px; animation: wave 0.8s ease-in-out infinite; opacity: 0.8; }
  .wave-bar:nth-child(1){animation-delay:0s;height:8px}
  .wave-bar:nth-child(2){animation-delay:0.1s;height:14px}
  .wave-bar:nth-child(3){animation-delay:0.2s;height:20px}
  .wave-bar:nth-child(4){animation-delay:0.3s;height:14px}
  .wave-bar:nth-child(5){animation-delay:0.4s;height:8px}
  .wave-bar:nth-child(6){animation-delay:0.1s;height:16px}
  .wave-bar:nth-child(7){animation-delay:0.2s;height:10px}

  /* Suggestions */
  #suggestions { display: flex; flex-wrap: wrap; gap: 7px; padding: 0 14px 10px 54px; position: relative; z-index: 1; }
  .chip { background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.2); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: rgba(0,212,255,0.65); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .chip:active { background: rgba(0,212,255,0.15); color: var(--cyan); }

  /* Footer */
  footer { padding: 10px 14px 14px; border-top: 1px solid var(--cyan-border); background: rgba(6,13,16,0.92); backdrop-filter: blur(20px); flex-shrink: 0; position: relative; z-index: 2; }
  .irow { display: flex; gap: 8px; align-items: flex-end; background: rgba(0,212,255,0.04); border: 1px solid var(--cyan-border); border-radius: 14px; padding: 8px 10px; }
  #ui { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; caret-color: var(--cyan); max-height: 100px; line-height: 1.5; padding: 4px 2px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; font-size: 16px; }
  #micBtn { background: rgba(0,212,255,0.1); color: var(--cyan); border: 1px solid rgba(0,212,255,0.25); }
  #micBtn.listening { background: rgba(255,60,60,0.2); color: #ff4444; border-color: rgba(255,60,60,0.4); animation: gp 0.8s ease-in-out infinite; }
  #sb { background: rgba(0,212,255,0.15); color: var(--cyan); border: 1px solid rgba(0,212,255,0.3); }
  #sb:disabled { opacity: 0.3; cursor: default; }
  #sb:not(:disabled) { background: rgba(0,212,255,0.22); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
  .fhint { text-align: center; margin-top: 6px; font-size: 10px; color: rgba(0,212,255,0.2); font-family: monospace; letter-spacing: 1px; }
  .chg { font-size: 10px; color: rgba(0,212,255,0.3); cursor: pointer; padding: 3px 7px; border: 1px solid rgba(0,212,255,0.15); border-radius: 6px; font-family: monospace; background: none; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="keyScreen">
  <div class="logo">JARVIS</div>
  <div class="logo-sub">MARK II · PERSONAL AI SYSTEM</div>
  <div class="setup-box">
    <div class="step">
      <div class="step-num">YOUR NAME</div>
      <input class="name-input" id="nameInput" type="text" placeholder="e.g. Aitor" maxlength="20"/>
    </div>
    <div class="step">
      <div class="step-num">FREE GROQ API KEY <span class="free-badge">100% FREE</span></div>
      <div class="step-text">
        Go to <a href="https://console.groq.com" target="_blank"><strong>console.groq.com</strong></a> → sign up free → API Keys → create & copy.
      </div>
      <input class="key-input" id="apiKeyInput" type="password" placeholder="gsk_..." autocomplete="off" spellcheck="false"/>
    </div>
    <button class="key-btn" onclick="saveKey()">▶ INITIALIZE JARVIS</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <header>
    <div class="av">◈<div class="av-dot"></div><div class="av-ring"></div></div>
    <div class="ht">
      <h1>JARVIS</h1>
      <p id="st">SYSTEMS ONLINE · READY</p>
    </div>
    <div style="text-align:right">
      <div id="clockDisplay">--:--</div>
      <div id="dateDisplay">---</div>
    </div>
    <button class="chg" onclick="showKey()">⚙</button>
  </header>

  <div id="messages"></div>
  <div id="waveform">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>
  <div id="suggestions"></div>

  <footer>
    <div class="irow">
      <button class="icon-btn" id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
      <textarea id="ui" rows="1" placeholder="Ask JARVIS anything…"></textarea>
      <button class="icon-btn" id="sb" onclick="send()" disabled>▶</button>
    </div>
    <div class="fhint">TAP 🎤 TO SPEAK · ENTER TO SEND</div>
  </footer>
</div>

<script>
const SYSTEM = (name) => `You are JARVIS, a sophisticated AI assistant serving ${name||'sir'}. You are helpful, precise, slightly formal but warm — like Tony Stark's JARVIS.

Address the user as "${name||'sir'}" occasionally.

When asked for a map or geographic info, respond with:
\`\`\`map
{"title":"Title","locations":[{"name":"Place","lat":36.12,"lng":-5.45,"note":"optional"}]}
\`\`\`

When asked about weather, respond with:
\`\`\`weather
{"location":"City, Country","temp":"22°C","feels":"20°C","desc":"Partly cloudy","icon":"⛅","humidity":"65%","wind":"12 km/h"}
\`\`\`

For everything else use markdown. Start replies with "Right away, ${name||'sir'}." or "Of course." or "Certainly, ${name||'sir'}." occasionally.`;

let apiKey = '', userName = '', history = [], busy = false;
let recognition = null, listening = false;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateDisplay').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// Input auto-resize
const inp = document.getElementById('ui');
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
  document.getElementById('sb').disabled = !inp.value.trim();
});
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  const n = document.getElementById('nameInput').value.trim();
  if (!k) { alert('Please paste your Groq API key.'); return; }
  apiKey = k; userName = n || 'sir';
  localStorage.setItem('j_key', k);
  localStorage.setItem('j_name', userName);
  showApp();
}
function showKey() {
  document.getElementById('keyScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
function showApp() {
  document.getElementById('keyScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  if (history.length === 0) welcome();
  inp.focus();
}

function welcome() {
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  addMsg('assistant', `${greet}, ${userName}. All systems are online and ready. I can answer questions, show maps, check weather, help with calculations, writing, and much more. What can I do for you?`);
  const chips = ['🗺️ Map of Algeciras', '🌤️ Weather in Algeciras', '🧮 What is 15% of 340?', '✍️ Write a poem about the sea'];
  const sg = document.getElementById('suggestions');
  sg.innerHTML = '';
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip'; el.textContent = c;
    el.onclick = () => { inp.value = c; inp.dispatchEvent(new Event('input')); send(); };
    sg.appendChild(el);
  });
}

// Voice input
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input not supported in this browser. Try Chrome.'); return;
  }
  if (listening) {
    recognition.stop(); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => {
    listening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('waveform').classList.add('active');
    document.getElementById('st').textContent = 'LISTENING…';
  };
  recognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    inp.value = txt;
    inp.dispatchEvent(new Event('input'));
    send();
  };
  recognition.onend = () => {
    listening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('st').textContent = 'SYSTEMS ONLINE · READY';
  };
  recognition.onerror = () => { recognition.stop(); };
  recognition.start();
}

// Speak response
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const clean = text.replace(/```[\s\S]*?```/g,'').replace(/[#*`]/g,'').trim().slice(0,300);
  const utt = new SpeechSynthesisUtterance(clean);
  utt.rate = 0.95; utt.pitch = 0.85; utt.volume = 1;
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.name.includes('Arthur'));
  if (preferred) utt.voice = preferred;
  speechSynthesis.speak(utt);
}

function parseMap(text) {
  const m = text.match(/```map\s*([\s\S]*?)```/);
  if (!m) return null;
  try { return JSON.parse(m[1].trim()); } catch { return null; }
}
function parseWeather(text) {
  const m = text.match(/```weather\s*([\s\S]*?)```/);
  if (!m) return null;
  try { return JSON.parse(m[1].trim()); } catch { return null; }
}

function md(text) {
  let t = text.replace(/```[\s\S]*?```/g,'').trim();
  t = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/^### (.+)/gm,'<h4>$1</h4>');
  t = t.replace(/^## (.+)/gm,'<h3>$1</h3>');
  t = t.replace(/^# (.+)/gm,'<h2>$1</h2>');
  t = t.replace(/^- (.+)/gm,'<div class="li"><span class="ar">▸</span><span>$1</span></div>');
  t = t.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  return t;
}

function mapCard(data) {
  const l = data.locations[0];
  const bbox = `${l.lng-.07},${l.lat-.07},${l.lng+.07},${l.lat+.07}`;
  const osm = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${l.lat},${l.lng}`;
  const gmLink = `https://maps.google.com/?q=${l.lat},${l.lng}`;
  const pins = data.locations.map(x=>`<div class="map-pin"><span>▸</span>${x.name}${x.note?' — '+x.note:''}</div>`).join('');
  return `<div class="map-card">
    <div class="map-title"><span>◈ MAP · ${data.title}</span><a href="${gmLink}" target="_blank" class="map-open-btn">OPEN IN MAPS ↗</a></div>
    <iframe src="${osm}" loading="lazy"></iframe>
    <div class="map-pins">${pins}</div>
  </div>`;
}

function weatherCard(data) {
  return `<div class="weather-card">
    <div class="weather-icon">${data.icon}</div>
    <div class="weather-info">
      <div class="weather-temp">${data.temp}</div>
      <div class="weather-desc">${data.desc}</div>
      <div class="weather-location">◈ ${data.location}</div>
      <div class="weather-details">
        <div class="weather-detail">Feels <span>${data.feels}</span></div>
        <div class="weather-detail">Humidity <span>${data.humidity}</span></div>
        <div class="weather-detail">Wind <span>${data.wind}</span></div>
      </div>
    </div>
  </div>`;
}

function addMsg(role, content) {
  if (role==='user') document.getElementById('suggestions').innerHTML='';
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = role==='user'?'◉':'◈';
  const mapData = role==='assistant' ? parseMap(content) : null;
  const weatherData = role==='assistant' ? parseWeather(content) : null;
  const body = role==='assistant' ? md(content) : content.replace(/</g,'&lt;');
  div.innerHTML = `<div class="ma">${icon}</div><div class="mb"><div class="bubble">${body}</div>${mapData?mapCard(mapData):''}${weatherData?weatherCard(weatherData):''}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg assistant'; div.id='typ';
  div.innerHTML=`<div class="ma">◈</div><div class="mb"><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typ'); if(t)t.remove(); }

async function send() {
  const text = inp.value.trim();
  if (!text || busy || !apiKey) return;
  busy=true; inp.value=''; inp.style.height='auto';
  document.getElementById('sb').disabled=true;
  document.getElementById('st').textContent='PROCESSING…';
  history.push({role:'user',content:text});
  addMsg('user',text);
  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:1000,
        messages:[{role:'system',content:SYSTEM(userName)},...history]
      })
    });
    const data = await res.json();
    hideTyping();
    if(data.error){
      addMsg('assistant',`⚠️ ${data.error.message}`);
    } else {
      const reply = data.choices[0].message.content;
      history.push({role:'assistant',content:reply});
      addMsg('assistant',reply);
      speak(reply);
    }
  } catch(e) {
    hideTyping();
    addMsg('assistant','⚠️ Connection error. Check your internet and try again.');
  }
  busy=false;
  document.getElementById('st').textContent='SYSTEMS ONLINE · READY';
  inp.focus();
}

window.onload = () => {
  const k = localStorage.getItem('j_key');
  const n = localStorage.getItem('j_name');
  if(k){ apiKey=k; userName=n||'sir'; showApp(); }
  speechSynthesis.getVoices();
};
</script>
