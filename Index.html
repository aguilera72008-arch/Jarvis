<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JARVIS"/>
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan: #00d4ff; --cyan-dim: rgba(0,212,255,0.12);
    --cyan-border: rgba(0,212,255,0.2); --bg: #060d10;
    --text: #d8eaed; --text-dim: #7aa8b0;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* KEY SCREEN */
  #keyScreen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); padding: 32px 24px; z-index: 100;
  }
  #keyScreen.hidden { display: none; }
  .logo { font-family: 'Orbitron', monospace; font-size: 30px; color: var(--cyan); letter-spacing: 6px; margin-bottom: 6px; }
  .logo-sub { font-size: 11px; color: rgba(0,212,255,0.4); letter-spacing: 2px; font-family: monospace; margin-bottom: 36px; }
  .setup-box { width: 100%; max-width: 360px; }
  .step { background: rgba(0,212,255,0.04); border: 1px solid var(--cyan-border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .step-num { font-size: 10px; color: var(--cyan); font-family: monospace; letter-spacing: 1px; margin-bottom: 6px; }
  .step-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .step-text a { color: var(--cyan); text-decoration: none; }
  .step-text strong { color: var(--text); }
  .key-input {
    width: 100%; background: rgba(0,212,255,0.05); border: 1px solid var(--cyan-border);
    border-radius: 10px; padding: 13px 15px; color: var(--text);
    font-size: 13px; font-family: monospace; outline: none; caret-color: var(--cyan);
    margin-top: 10px;
  }
  .key-input:focus { border-color: rgba(0,212,255,0.5); }
  .key-btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.4);
    border-radius: 10px; color: var(--cyan);
    font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
  }
  .key-btn:hover { background: rgba(0,212,255,0.25); }
  .free-badge { display: inline-block; background: rgba(0,255,120,0.1); border: 1px solid rgba(0,255,120,0.3); color: #00ff88; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; font-family: monospace; }

  /* APP */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }
  #app.hidden { display: none; }
  .glow { position: fixed; top: -10%; left: 50%; transform: translateX(-50%); width: 70vw; height: 35vh; background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%); pointer-events: none; animation: gp 4s ease-in-out infinite; }
  @keyframes gp { 0%,100%{opacity:0.5} 50%{opacity:1} }
  @keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bl { 0%,100%{opacity:0.2;transform:scale(0.7)} 50%{opacity:1;transform:scale(1)} }

  header {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    border-bottom: 1px solid var(--cyan-border);
    background: rgba(6,13,16,0.9); backdrop-filter: blur(20px);
    flex-shrink: 0; position: relative; z-index: 2;
  }
  .av { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid rgba(0,212,255,0.45); background: rgba(0,212,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--cyan); position: relative; }
  .av-dot { position: absolute; bottom: 1px; right: 1px; width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); animation: gp 2s ease-in-out infinite; }
  .ht h1 { font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 3px; color: var(--cyan); font-weight: 700; }
  .ht p { font-size: 10px; color: rgba(0,212,255,0.4); letter-spacing: 1px; font-family: monospace; }
  .chg { margin-left: auto; font-size: 10px; color: rgba(0,212,255,0.3); cursor: pointer; padding: 4px 8px; border: 1px solid rgba(0,212,255,0.15); border-radius: 6px; font-family: monospace; background: none; letter-spacing: 1px; }
  .chg:hover { color: var(--cyan); }

  #messages { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.15); border-radius: 2px; }

  .msg { display: flex; gap: 10px; margin-bottom: 16px; animation: fu 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  .ma { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid var(--cyan-border); }
  .msg.user .ma { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
  .msg.assistant .ma { background: rgba(0,212,255,0.08); color: var(--cyan); }
  .mb { max-width: 83%; display: flex; flex-direction: column; gap: 8px; }
  .bubble { padding: 11px 14px; font-size: 14px; line-height: 1.65; }
  .msg.user .bubble { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px 4px 14px 14px; color: #e0eaec; }
  .msg.assistant .bubble { background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.12); border-radius: 4px 14px 14px 14px; color: #b8d4d8; }
  .bubble strong { color: #e0eaec; }
  .bubble code { background: rgba(0,212,255,0.1); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.88em; }
  .bubble h2,.bubble h3,.bubble h4 { color: var(--cyan); margin: 10px 0 4px; }
  .li { display: flex; gap: 6px; margin: 2px 0; }
  .li .ar { color: var(--cyan); flex-shrink: 0; }

  .map-card { border: 1px solid rgba(0,212,255,0.2); border-radius: 12px; overflow: hidden; background: rgba(0,212,255,0.03); }
  .map-title { padding: 8px 12px; font-size: 11px; color: var(--cyan); font-family: monospace; letter-spacing: 1px; border-bottom: 1px solid rgba(0,212,255,0.1); }
  .map-card iframe { display: block; width: 100%; border: none; height: 230px; }
  .map-pins { padding: 8px 12px; }
  .map-pin { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
  .map-pin span { color: var(--cyan); margin-right: 4px; }

  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 14px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); opacity: 0.4; animation: bl 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

  #suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 14px 10px 54px; }
  .chip { background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.2); border-radius: 20px; padding: 6px 13px; font-size: 12px; color: rgba(0,212,255,0.65); cursor: pointer; transition: all 0.2s; }
  .chip:hover { background: rgba(0,212,255,0.12); color: var(--cyan); }

  footer { padding: 12px 14px; border-top: 1px solid var(--cyan-border); background: rgba(6,13,16,0.9); backdrop-filter: blur(20px); flex-shrink: 0; }
  .irow { display: flex; gap: 10px; align-items: flex-end; background: rgba(0,212,255,0.04); border: 1px solid var(--cyan-border); border-radius: 14px; padding: 10px 12px; }
  #ui { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; caret-color: var(--cyan); max-height: 100px; line-height: 1.5; }
  #sb { width: 34px; height: 34px; border-radius: 8px; border: none; background: rgba(0,212,255,0.2); color: var(--cyan); font-size: 15px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  #sb:disabled { opacity: 0.3; cursor: default; }
  #sb:not(:disabled):hover { background: rgba(0,212,255,0.35); box-shadow: 0 0 12px rgba(0,212,255,0.3); }
  .fhint { text-align: center; margin-top: 6px; font-size: 10px; color: rgba(0,212,255,0.2); font-family: monospace; letter-spacing: 1px; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="keyScreen">
  <div class="logo">JARVIS</div>
  <div class="logo-sub">PERSONAL AI ASSISTANT</div>
  <div class="setup-box">
    <div class="step">
      <div class="step-num">STEP 1 — GET FREE KEY <span class="free-badge">100% FREE</span></div>
      <div class="step-text">
        Go to <a href="https://console.groq.com" target="_blank"><strong>console.groq.com</strong></a> → sign up free → go to <strong>API Keys</strong> → create one and copy it.<br><br>
        Groq is completely free, no credit card needed.
      </div>
    </div>
    <div class="step">
      <div class="step-num">STEP 2 — PASTE IT HERE</div>
      <input class="key-input" id="apiKeyInput" type="password" placeholder="gsk_..." autocomplete="off" spellcheck="false"/>
    </div>
    <button class="key-btn" onclick="saveKey()">▶ INITIALIZE JARVIS</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="glow"></div>
  <header>
    <div class="av">◈<div class="av-dot"></div></div>
    <div class="ht">
      <h1>JARVIS</h1>
      <p id="st">SYSTEMS ONLINE · READY</p>
    </div>
    <button class="chg" onclick="showKey()">KEY</button>
  </header>
  <div id="messages"></div>
  <div id="suggestions"></div>
  <footer>
    <div class="irow">
      <textarea id="ui" rows="1" placeholder="Ask JARVIS anything…"></textarea>
      <button id="sb" onclick="send()" disabled>▶</button>
    </div>
    <div class="fhint">ENTER TO SEND · SHIFT+ENTER NEW LINE</div>
  </footer>
</div>

<script>
const SYSTEM = `You are JARVIS, a sophisticated AI assistant. Helpful, precise, slightly formal but warm.

When user asks for a map or geographic info, respond with this exact block:
\`\`\`map
{"title":"Title here","locations":[{"name":"Place","lat":36.12,"lng":-5.45,"note":"optional"}]}
\`\`\`

For everything else use markdown. Start every reply with a confident short line like "Right away." or "Of course." or "Certainly, sir."`;

let apiKey = '', history = [], busy = false;

const inp = document.getElementById('ui');
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
  document.getElementById('sb').disabled = !inp.value.trim();
});
inp.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey){e.preventDefault();send();} });

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k) { alert('Please paste your Groq API key first.'); return; }
  apiKey = k;
  localStorage.setItem('jarvis_groq_key', k);
  showApp();
}
function showKey() {
  document.getElementById('keyScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
function showApp() {
  document.getElementById('keyScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  if (history.length === 0) welcome();
  inp.focus();
}

function welcome() {
  addMsg('assistant', "Good day. I'm JARVIS — your personal AI assistant, powered by Groq's lightning-fast AI. Ask me anything: maps, research, calculations, writing, or general knowledge.");
  const chips = ['Show map of Algeciras', 'Map of Tokyo', 'What is quantum computing?', 'Write a poem about the ocean'];
  const sg = document.getElementById('suggestions');
  sg.innerHTML = '';
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip'; el.textContent = c;
    el.onclick = () => { inp.value = c; inp.dispatchEvent(new Event('input')); send(); };
    sg.appendChild(el);
  });
}

function parseMap(text) {
  const m = text.match(/```map\s*([\s\S]*?)```/);
  if (!m) return null;
  try { return JSON.parse(m[1].trim()); } catch { return null; }
}

function md(text) {
  let t = text.replace(/```map[\s\S]*?```/g,'').trim();
  t = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/^### (.+)/gm,'<h4>$1</h4>');
  t = t.replace(/^## (.+)/gm,'<h3>$1</h3>');
  t = t.replace(/^# (.+)/gm,'<h2>$1</h2>');
  t = t.replace(/^- (.+)/gm,'<div class="li"><span class="ar">▸</span><span>$1</span></div>');
  t = t.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  return t;
}

function mapCard(data) {
  const l = data.locations[0];
  const bbox = `${l.lng-.06},${l.lat-.06},${l.lng+.06},${l.lat+.06}`;
  const osm = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${l.lat},${l.lng}`;
  const pins = data.locations.map(x=>`<div class="map-pin"><span>▸</span>${x.name}${x.note?' — '+x.note:''}</div>`).join('');
  return `<div class="map-card"><div class="map-title">◈ MAP · ${data.title}</div><iframe src="${osm}" loading="lazy"></iframe><div class="map-pins">${pins}</div></div>`;
}

function addMsg(role, content) {
  if (role==='user') document.getElementById('suggestions').innerHTML='';
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = role==='user'?'◉':'◈';
  const mapData = role==='assistant' ? parseMap(content) : null;
  const body = role==='assistant' ? md(content) : content.replace(/</g,'&lt;');
  div.innerHTML = `<div class="ma">${icon}</div><div class="mb"><div class="bubble">${body}</div>${mapData?mapCard(mapData):''}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg assistant'; div.id='typ';
  div.innerHTML=`<div class="ma">◈</div><div class="mb"><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typ'); if(t)t.remove(); }

async function send() {
  const text = inp.value.trim();
  if (!text || busy || !apiKey) return;
  busy = true; inp.value=''; inp.style.height='auto';
  document.getElementById('sb').disabled=true;
  document.getElementById('st').textContent='PROCESSING…';
  history.push({role:'user', content:text});
  addMsg('user', text);
  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        messages: [{ role:'system', content:SYSTEM }, ...history]
      })
    });
    const data = await res.json();
    hideTyping();
    if (data.error) {
      addMsg('assistant', `⚠️ ${data.error.message}`);
    } else {
      const reply = data.choices[0].message.content;
      history.push({role:'assistant', content:reply});
      addMsg('assistant', reply);
    }
  } catch(e) {
    hideTyping();
    addMsg('assistant','⚠️ Connection error. Check your internet and try again.');
  }
  busy=false;
  document.getElementById('st').textContent='SYSTEMS ONLINE · READY';
  inp.focus();
}

window.onload = () => {
  const k = localStorage.getItem('jarvis_groq_key');
  if (k) { apiKey=k; showApp(); }
};
</script>
</body>
</html>
